# Run unit / mocked tests on every push and PR (no live network by default).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests (excluding network)
        run: |
          pytest -q -m "not network" --tb=short

      - name: Run tests (network) — optional smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          pytest -q tests/test_web_tools.py -m network --tb=short

  audit-verify-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify audit/report fixtures and websocket contracts
        run: |
          pytest -q tests/test_verify_report_fixture.py tests/test_websocket_event_contract.py tests/test_frontend_cutover_serving.py --tb=short

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Build frontend-v2
        working-directory: frontend-v2
        run: |
          npm ci
          npm run build

      - name: Run frontend-v2 tests
        working-directory: frontend-v2
        run: |
          npx vitest run
