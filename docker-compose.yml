version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: cowork_chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: cowork_searxng
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    restart: unless-stopped

volumes:
  chroma_data:
  searxng_data:
