version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: owlynn_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: owlynn_searxng
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: owlynn_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    mem_limit: 512m

volumes:
  qdrant_data:
  searxng_data:
  redis_data:
