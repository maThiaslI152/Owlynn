[pytest]
pythonpath = .
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
norecursedirs = standalone .git __pycache__ .pytest_cache
markers =
    network: HTTP, live search, or browser (not run in default CI)
    integration: optional external services (e.g. Qdrant when reachable)
    llm: requires RUN_LLM_INTEGRATION=1 and a local OpenAI-compatible server
